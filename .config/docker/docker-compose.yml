version: '3.8'

services:
  # The Styx API (Workstream 1)
  styx-api:
    build:
      context: .
      dockerfile: ./src/api/Dockerfile
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=development
      - POSTGRES_HOST=styx-postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=styx_admin
      - POSTGRES_PASSWORD=styx_local_secret
      - POSTGRES_DB=styx_ledger
      - DATABASE_URL=postgresql://styx_admin:styx_local_secret@styx-postgres:5432/styx_ledger
      - REDIS_HOST=styx-redis
      - REDIS_PORT=6379
    depends_on:
      - styx-postgres
      - styx-redis
    networks:
      - styx-network

  # Core Ledger Database (PostgreSQL)
  styx-postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: styx_admin
      POSTGRES_PASSWORD: styx_local_secret
      POSTGRES_DB: styx_ledger
    ports:
      - '5432:5432'
    volumes:
      - styx-pg-data:/var/lib/postgresql/data
      - ./src/api/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./src/api/database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    networks:
      - styx-network

  # Core Router Queue (Redis)
  styx-redis:
    image: redis:7-alpine
    restart: always
    ports:
      - '6379:6379'
    networks:
      - styx-network
    command: redis-server --appendonly yes
    volumes:
      - styx-redis-data:/data

  # Web Dashboard (Next.js)
  styx-web:
    build:
      context: .
      dockerfile: ./src/web/Dockerfile
    ports:
      - '3001:3000'
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://styx-api:3000
    depends_on:
      - styx-api
    networks:
      - styx-network

volumes:
  styx-pg-data:
  styx-redis-data:

networks:
  styx-network:
    driver: bridge
