services:
  # The Styx API (Workstream 1)
  styx-api:
    build:
      context: ../..
      dockerfile: src/api/Dockerfile
      args:
        API_CONTAINER_PORT: ${STYX_DOCKER_API_CONTAINER_PORT:?STYX_DOCKER_API_CONTAINER_PORT is required}
    ports:
      - "${STYX_DOCKER_API_PORT:?STYX_DOCKER_API_PORT is required}:${STYX_DOCKER_API_CONTAINER_PORT:?STYX_DOCKER_API_CONTAINER_PORT is required}"
    environment:
      NODE_ENV: ${STYX_DOCKER_API_NODE_ENV:?STYX_DOCKER_API_NODE_ENV is required}
      PORT: ${STYX_DOCKER_API_CONTAINER_PORT:?STYX_DOCKER_API_CONTAINER_PORT is required}
      DATABASE_URL: ${STYX_DOCKER_DATABASE_URL:?STYX_DOCKER_DATABASE_URL is required}
      REDIS_URL: ${STYX_DOCKER_REDIS_URL:?STYX_DOCKER_REDIS_URL is required}
      STYX_API_PUBLIC_URL: ${STYX_API_PUBLIC_URL:?STYX_API_PUBLIC_URL is required}
      STYX_WEB_PUBLIC_URL: ${STYX_WEB_PUBLIC_URL:?STYX_WEB_PUBLIC_URL is required}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      # Required app secrets — the 2026-05-26 hardening removed insecure fallbacks,
      # so the API throws at use-time if these are unset. Passed through from the
      # env file (compose.defaults.env for local, real values via Render in prod).
      JWT_SECRET: ${JWT_SECRET:-}
      APP_SECRET: ${APP_SECRET:-}
      ANONYMIZE_SALT: ${ANONYMIZE_SALT:-}
      ZK_EXHAUST_SECRET: ${ZK_EXHAUST_SECRET:-}
      STYX_WEBHOOK_SECRET: ${STYX_WEBHOOK_SECRET:-}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-}
    depends_on:
      - styx-postgres
      - styx-redis
    networks:
      - styx-network

  # Core Ledger Database (PostgreSQL)
  styx-postgres:
    image: ${STYX_DOCKER_POSTGRES_IMAGE:?STYX_DOCKER_POSTGRES_IMAGE is required}
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    ports:
      - "${STYX_DOCKER_POSTGRES_PORT:?STYX_DOCKER_POSTGRES_PORT is required}:${POSTGRES_PORT:?POSTGRES_PORT is required}"
    volumes:
      - styx-pg-data:/var/lib/postgresql/data
      - ../../src/api/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ../../src/api/database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    networks:
      - styx-network

  # Core Router Queue (Redis)
  styx-redis:
    image: ${STYX_DOCKER_REDIS_IMAGE:?STYX_DOCKER_REDIS_IMAGE is required}
    restart: always
    ports:
      - "${STYX_DOCKER_REDIS_PORT:?STYX_DOCKER_REDIS_PORT is required}:${REDIS_PORT:?REDIS_PORT is required}"
    networks:
      - styx-network
    command: redis-server --appendonly yes
    volumes:
      - styx-redis-data:/data

  # Web Dashboard (Next.js)
  styx-web:
    build:
      context: ../..
      dockerfile: src/web/Dockerfile
      args:
        WEB_CONTAINER_PORT: ${STYX_DOCKER_WEB_CONTAINER_PORT:?STYX_DOCKER_WEB_CONTAINER_PORT is required}
    ports:
      - "${STYX_DOCKER_WEB_PORT:?STYX_DOCKER_WEB_PORT is required}:${STYX_DOCKER_WEB_CONTAINER_PORT:?STYX_DOCKER_WEB_CONTAINER_PORT is required}"
    environment:
      NODE_ENV: ${STYX_DOCKER_WEB_NODE_ENV:?STYX_DOCKER_WEB_NODE_ENV is required}
      PORT: ${STYX_DOCKER_WEB_CONTAINER_PORT:?STYX_DOCKER_WEB_CONTAINER_PORT is required}
      NEXT_PUBLIC_API_URL: ${STYX_DOCKER_API_INTERNAL_URL:?STYX_DOCKER_API_INTERNAL_URL is required}
      STYX_WEB_PUBLIC_URL: ${STYX_WEB_PUBLIC_URL:?STYX_WEB_PUBLIC_URL is required}
      NEXT_PUBLIC_WEB_URL: ${NEXT_PUBLIC_WEB_URL:-}
    depends_on:
      - styx-api
    networks:
      - styx-network

volumes:
  styx-pg-data:
  styx-redis-data:

networks:
  styx-network:
    driver: bridge
