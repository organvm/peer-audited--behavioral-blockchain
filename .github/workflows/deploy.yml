name: Deploy to Production

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  staging_promotion_gate:
    uses: ./.github/workflows/staging-promotion.yml
    with:
      promotion_target: prod
    secrets: inherit

  beta_promotion_gate:
    uses: ./.github/workflows/beta-promotion.yml
    with:
      promotion_target: prod
      require_manual_approval: false
    secrets: inherit

  preflight:
    runs-on: ubuntu-latest
    needs: [staging_promotion_gate, beta_promotion_gate]
    steps:
      - name: Validate deployment trigger and ref
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Ref:   ${{ github.ref }}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "❌ Manual production deploys are only allowed from main."
            exit 1
          fi

          if [ "${{ github.event_name }}" = "push" ]; then
            case "${{ github.ref }}" in
              refs/tags/v*) ;;
              *)
                echo "❌ Tag deploys must use refs/tags/v*."
                exit 1
                ;;
            esac
          fi

  deploy_api:
    runs-on: ubuntu-latest
    needs: preflight
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Deploy API to Render
        uses: johnbeynon/render-deploy-action@v0.0.9
        with:
          service-id: ${{ secrets.RENDER_API_SERVICE_ID }}
          api-key: ${{ secrets.RENDER_API_KEY }}

  deploy_web:
    runs-on: ubuntu-latest
    needs: preflight
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Deploy Web to Render
        uses: johnbeynon/render-deploy-action@v0.0.9
        with:
          service-id: ${{ secrets.RENDER_WEB_SERVICE_ID }}
          api-key: ${{ secrets.RENDER_API_KEY }}

  migrate:
    runs-on: ubuntu-latest
    needs: deploy_api
    environment: production
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node.js 20.x
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Database Migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: cd src/api && npm run migrate

  smoke_test:
    runs-on: ubuntu-latest
    needs: [deploy_api, deploy_web, migrate]
    environment: production
    steps:
      - name: Wait for services
        run: sleep 30

      - name: Health check API (with rollback)
        env:
          API_URL: ${{ secrets.API_URL }}
          EXPECTED_ENV_LABEL: ${{ secrets.API_ENV_LABEL }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_API_SERVICE_ID: ${{ secrets.RENDER_API_SERVICE_ID }}
        run: |
          if ! bash scripts/smoke/check-api-ready.sh; then
            echo "❌ API readiness smoke check failed"
            echo "🔄 Triggering best-effort redeploy fallback (not a deterministic rollback to a known-good deploy)..."

            # Best-effort fallback: trigger a new deploy. This is NOT a deterministic rollback.
            curl -s -X POST "https://api.render.com/v1/services/${RENDER_API_SERVICE_ID}/deploys" \
              -H "Authorization: Bearer ${RENDER_API_KEY}" \
              -H "Content-Type: application/json" \
              -d '{"clearCache": false}' || echo "Rollback trigger attempted"

            exit 1
          fi

          bash scripts/smoke/check-api-release.sh

      - name: Health check Web
        env:
          WEB_URL: ${{ secrets.WEB_URL }}
        run: |
          bash scripts/smoke/check-web.sh
