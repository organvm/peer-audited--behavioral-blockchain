name: Styx CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  merge_group:

jobs:
  # Matrix executes the actual build/test work. Renamed from `build_and_test`
  # so the canonical required-check name (`build_and_test`, the summary job
  # below) is stable regardless of matrix axis size. Branch protection in
  # .github/rulesets/main.json targets the summary job by name.
  #
  # BLOCKING gate (must be able to fail a merge — do not add `continue-on-error`
  # here). Advisory/infra-dependent jobs further below keep it.
  build_and_test_matrix:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Turbo Cache
        uses: actions/cache@v5
        with:
          path: .turbo/cache
          key: turbo-${{ hashFiles('package-lock.json', 'turbo.json') }}
          restore-keys: |
            turbo-

      - name: Security Audit
        run: npm audit --audit-level=high

      - name: Run Tests (Turborepo)
        # NOTE: do not forward `--coverage --ci` here. Those are jest-only flags:
        # `--ci` makes the vitest workspaces (ask-styx, test-harness) throw
        # `CACError: Unknown option --ci`, and `--coverage` currently fails api
        # suite-loading. Each workspace owns its own test invocation. Re-introducing
        # coverage-threshold gating is tracked as a follow-up once coverage mode is
        # fixed (see docs/audit/2026-05-26-index-propagation-and-vacuum-log.md).
        run: npm test

      - name: Upload Coverage Reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-reports
          path: |
            src/*/coverage/
          retention-days: 14

      - name: Build (Turborepo)
        run: npm run build

      - name: Lint (Turborepo)
        run: npm run lint

      - name: Gate 04 — Redacted Build Check
        run: bash scripts/validation/04-redacted-build-check.sh

      - name: Gate 05 — Behavioral Physics Check (integration)
        env:
          API_URL: ${{ secrets.CI_GATE05_API_URL }}
        run: |
          if [ -z "${API_URL:-}" ]; then
            echo "::warning::Skipping Gate 05 (NOT VERIFIED): set CI_GATE05_API_URL to a live integration API."
            exit 0
          fi
          npx tsx scripts/validation/05-behavioral-physics-check.ts

      - name: Gate 06 — Security Invariant Check
        run: npx tsx scripts/validation/06-security-invariant-check.ts

      - name: Gate 07 — Claim Drift Check
        run: npm run validate:claims

  # Stable required-check name for branch protection. Aggregates the matrix
  # result so the required context (`build_and_test`) never changes shape
  # even if the matrix axis grows (e.g. adding Node 22.x for fan-out tests).
  # `if: always()` is mandatory — without it, a matrix failure produces a
  # SKIPPED summary, which leaves required-check status pending forever
  # (silent-deadlock failure mode).
  build_and_test:
    runs-on: ubuntu-latest
    needs: [build_and_test_matrix]
    if: always()
    steps:
      - name: Gate verdict
        run: |
          result="${{ needs.build_and_test_matrix.result }}"
          if [[ "$result" != "success" ]]; then
            echo "::error::build_and_test_matrix concluded '$result' — gate failed."
            exit 1
          fi
          echo "build_and_test_matrix succeeded — gate passed."

  beta_readiness:
    runs-on: ubuntu-latest
    needs: build_and_test_matrix
    continue-on-error: true
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Use Node.js 20.x
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: "npm"

      - name: Install Dependencies
        run: npm install

      - name: Run Beta Readiness Suite
        env:
          READINESS_PROFILE: beta
          # Advisory in PR CI: beta readiness validates a LIVE deployed target, which
          # PRs don't have. Don't hard-require targets here (that turned "no live URL"
          # into a red check) — the suite skips cleanly when no target is set. The
          # deploy/promotion workflows set this true where a live URL exists.
          READINESS_REQUIRE_TARGETS: "false"
          # Explicitly empty the target URLs on PR CI so the suite takes the
          # skip-clean path regardless of any stale secret (e.g. a CI_GATE05_API_URL
          # pointing at a broken/old environment). Deploy & promotion workflows set
          # these where a live URL actually exists.
          BETA_API_URL: ""
          BETA_WEB_URL: ""
          BETA_ENV_LABEL: ""
        run: npm run beta:readiness

      - name: Upload Beta Readiness Summary
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: beta-readiness-summary
          path: artifacts/beta-readiness-summary.json
          retention-days: 14

  terraform_validate:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.9"

      - name: Terraform Format Check
        working-directory: infra/terraform
        run: terraform fmt -check -recursive -diff

      - name: Terraform Init (validation only)
        working-directory: infra/terraform
        run: terraform init -backend=false -input=false

      - name: Terraform Validate
        working-directory: infra/terraform
        run: terraform validate

  changed-files:
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.check.outputs.web }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: check
        run: |
          BASE="${{ github.event.pull_request.base.sha || 'HEAD~1' }}"
          if git diff --name-only "$BASE" | grep -qE "^(src/web/|e2e/|src/shared/|\.config/playwright/)"; then
            echo "web=true" >> "$GITHUB_OUTPUT"
          else
            echo "web=false" >> "$GITHUB_OUTPUT"
          fi

  # Browser E2E work. Renamed from `e2e` → `e2e_browsers` so the stable required-check
  # name (`e2e`, the summary gate below) never changes shape and always posts a result.
  # Web-gated and advisory (continue-on-error), exactly as before — only the job id moved.
  e2e_browsers:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build_and_test_matrix, beta_readiness, changed-files]
    if: needs.changed-files.outputs.web == 'true'
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Use Node.js 20.x
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: "npm"

      - name: Install Dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Build Web
        run: cd src/web && npm run build

      - name: Run E2E Tests (${{ matrix.browser }})
        run: npx playwright test --config=.config/playwright/playwright.config.ts --project=${{ matrix.browser }}
        env:
          CI: true
          # The hardened Playwright config no longer falls back to a default
          # base URL — it requires one of E2E_BASE_URL / STYX_WEB_PUBLIC_URL /
          # NEXT_PUBLIC_WEB_URL. CI binds the web server to 3001 (see PR #616).
          E2E_BASE_URL: http://127.0.0.1:3001

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 14

  # Stable required-check name for branch protection. The classic branch-protection
  # rule on `main` requires the `e2e` context. The browser job above is web-gated and
  # SKIPS on config/docs-only PRs — and GitHub treats a *skipped* required context as
  # unsatisfied, so those PRs wedge forever (the identical silent-deadlock failure mode
  # already documented on `build_and_test`). This summary job ALWAYS runs (`if: always()`
  # is mandatory) so the required `e2e` context always reports a real conclusion:
  #   - no web-affecting changes  -> pass (the browser suite is not applicable)
  #   - web changed               -> reflect the browser result (advisory: a browser
  #                                   failure warns but does not block, matching the
  #                                   `continue-on-error` design; `build_and_test` in
  #                                   .github/rulesets/main.json is the enforcing gate).
  e2e:
    runs-on: ubuntu-latest
    needs: [changed-files, e2e_browsers]
    if: always()
    steps:
      - name: E2E gate verdict
        run: |
          web="${{ needs.changed-files.outputs.web }}"
          res="${{ needs.e2e_browsers.result }}"
          if [[ "$web" != "true" ]]; then
            echo "No web-affecting changes — browser E2E suite not applicable; gate passes."
            exit 0
          fi
          if [[ "$res" == "cancelled" ]]; then
            echo "::error::e2e_browsers was cancelled — gate fails."
            exit 1
          fi
          if [[ "$res" != "success" ]]; then
            echo "::warning::e2e_browsers concluded '$res' (advisory; see e2e_browsers checks). build_and_test is the enforcing gate."
          fi
          echo "e2e gate passes (e2e_browsers result: $res)."
          exit 0

  # NOTE: CodeQL analysis runs in the dedicated .github/workflows/codeql.yml
  # workflow. A second copy here produced a duplicate javascript-typescript
  # configuration (ci.yml:codeql) that conflicted with the dedicated one and
  # surfaced as a "configuration not found" code-scanning check. Keep a single
  # CodeQL configuration to avoid that conflict.
