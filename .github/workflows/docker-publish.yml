name: Build & Publish Docker Images

# Builds the API and Web container images and publishes them to the GitHub
# Container Registry (GHCR). This complements the Render deploy in deploy.yml:
# Render builds from source on its own infra, while this workflow produces
# portable, versioned images for self-hosting (Docker / Compose / Kubernetes).
#
# Pull the published images with:
#   docker pull ghcr.io/<owner>/styx-api:latest
#   docker pull ghcr.io/<owner>/styx-web:latest

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            dockerfile: src/api/Dockerfile
            image: styx-api
            build_args: |
              API_CONTAINER_PORT=3000
          - service: web
            dockerfile: src/web/Dockerfile
            image: styx-web
            build_args: |
              WEB_CONTAINER_PORT=3001
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push ${{ matrix.service }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
